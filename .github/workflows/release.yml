name: release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.id }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: windows-x64
            os: windows-latest
            archive_name: limerence-windows-x64.zip
          - id: linux-x64
            os: ubuntu-latest
            archive_name: limerence-linux-x64.tar.gz
          - id: macos-arm64
            os: macos-latest
            archive_name: limerence-macos-arm64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.id == 'linux-x64'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential xorg-dev

      - name: Install MSYS2 toolchain
        if: matrix.id == 'windows-x64'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Build nob
        if: matrix.id != 'windows-x64'
        shell: bash
        run: cc -o nob nob.c

      - name: Build nob
        if: matrix.id == 'windows-x64'
        shell: msys2 {0}
        run: gcc -o nob.exe nob.c

      - name: Build limerence
        if: matrix.id != 'windows-x64'
        shell: bash
        run: ./nob --release

      - name: Build limerence
        if: matrix.id == 'windows-x64'
        shell: msys2 {0}
        run: ./nob.exe --release

      - name: Smoke test export pipeline
        if: matrix.id != 'windows-x64'
        shell: bash
        run: ./limerence export examples/basic_scene

      - name: Smoke test export pipeline
        if: matrix.id == 'windows-x64'
        shell: msys2 {0}
        run: ./limerence.exe export examples/basic_scene

      - name: Package Windows release
        if: matrix.id == 'windows-x64'
        shell: powershell
        run: Compress-Archive -Path limerence.exe -DestinationPath ${{ matrix.archive_name }}

      - name: Package Linux release
        if: matrix.id == 'linux-x64'
        shell: bash
        run: tar -czf "${{ matrix.archive_name }}" limerence

      - name: Check macOS signing secrets
        if: matrix.id == 'macos-arm64'
        id: macos_secrets
        shell: bash
        env:
          APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
          APPLE_DEVELOPER_TEAM_ID: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
        run: |
          ready=true
          for name in \
            APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 \
            APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD \
            APPLE_DEVELOPER_IDENTITY \
            APPLE_DEVELOPER_TEAM_ID \
            APPLE_NOTARY_APPLE_ID \
            APPLE_NOTARY_APP_PASSWORD
          do
            if [ -z "${!name}" ]; then
              echo "Missing secret: $name"
              ready=false
            fi
          done
          echo "ready=$ready" >> "$GITHUB_OUTPUT"

      - name: Require macOS signing secrets for published releases
        if: matrix.id == 'macos-arm64' && github.event_name == 'release' && steps.macos_secrets.outputs.ready != 'true'
        shell: bash
        run: |
          echo "Published releases require Apple signing and notarization secrets." >&2
          exit 1

      - name: Build macOS app bundle
        if: matrix.id == 'macos-arm64'
        shell: bash
        run: |
          APP_NAME="Limerence"
          APP_DIR="$APP_NAME.app"
          mkdir -p "$APP_DIR/Contents/MacOS" "$APP_DIR/Contents/Resources"
          cp limerence "$APP_DIR/Contents/MacOS/limerence"
          chmod +x "$APP_DIR/Contents/MacOS/limerence"

          cat > "$APP_DIR/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>limerence</string>
            <key>CFBundleIdentifier</key>
            <string>com.limerence3d.limerence</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>Limerence</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ github.event.release.tag_name || github.ref_name }}</string>
            <key>CFBundleVersion</key>
            <string>${{ github.run_number }}</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Sign and notarize macOS app
        if: matrix.id == 'macos-arm64' && steps.macos_secrets.outputs.ready == 'true'
        shell: bash
        env:
          APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
          APPLE_DEVELOPER_TEAM_ID: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
        run: |
          APP_NAME="Limerence"
          APP_DIR="$APP_NAME.app"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          echo "$APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          codesign --force --deep --options runtime --timestamp --sign "$APPLE_DEVELOPER_IDENTITY" "$APP_DIR"
          codesign --verify --deep --strict --verbose=2 "$APP_DIR"

          ditto -c -k --keepParent "$APP_DIR" "$RUNNER_TEMP/${{ matrix.archive_name }}"
          xcrun notarytool submit "$RUNNER_TEMP/${{ matrix.archive_name }}" \
            --apple-id "$APPLE_NOTARY_APPLE_ID" \
            --team-id "$APPLE_DEVELOPER_TEAM_ID" \
            --password "$APPLE_NOTARY_APP_PASSWORD" \
            --wait

          xcrun stapler staple "$APP_DIR"
          spctl -a -vvv -t exec "$APP_DIR"

          rm -f "${{ matrix.archive_name }}"
          ditto -c -k --keepParent "$APP_DIR" "${{ matrix.archive_name }}"

      - name: Package unsigned macOS app for manual runs
        if: matrix.id == 'macos-arm64' && steps.macos_secrets.outputs.ready != 'true' && github.event_name != 'release'
        shell: bash
        run: |
          APP_NAME="Limerence"
          APP_DIR="$APP_NAME.app"
          ditto -c -k --keepParent "$APP_DIR" "${{ matrix.archive_name }}"

      - name: Upload packaged release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error

  publish:
    name: publish-release-assets
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          shopt -s globstar nullglob
          gh release upload "$TAG_NAME" release-assets/** --clobber
